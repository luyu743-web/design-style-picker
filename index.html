<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大厂 UI 风格生成器</title>
  <link rel="icon" type="image/svg+xml" href="./assets/style-picker-mark.svg">
  <link rel="shortcut icon" href="./assets/style-picker-mark.svg">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  <link rel="manifest" href="./site.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta http-equiv="refresh" content="0; url=./style-picker.html">
  <script>
    const target = new URL("./style-picker.html", window.location.href);
    target.search = window.location.search;

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;

      background: #0b1020;
      color: #f8fafc;
      font: 500 16px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .hint {
      padding: 18px 22px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(15,23,42,0.78);
      box-shadow: 0 18px 60px rgba(2,6,23,0.42);
    }
    a { color: #93c5fd; }
  </style>

<body>
  <div class="hint">
    正在进入大厂 UI 风格生成器…
